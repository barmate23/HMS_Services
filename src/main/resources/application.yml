server:
  port: 9005

spring:
  application:
    name: hmsservice

  datasource:
    url: jdbc:mysql://erp-mysql:3306/hotel?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
    defer-datasource-initialization: true
  sql:
    init:
      mode: always

  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

  config:
    import: "optional:configserver:"

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    com.hotelerp.hmsservice: INFO
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%X{logId:-}] [%X{requestId:-}] [%X{operation:-}] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%X{logId:-}] [%X{requestId:-}] [%X{operation:-}] [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/hms-service.log

app:
  name: HMS Integrated Services
  version: 1.0.0
  description: Integrated microservice for Housekeeping, Maintenance, Lost & Found, and POS Operations

hms:
  bootstrap:
    admin:
      enabled: ${HMS_BOOTSTRAP_ADMIN_ENABLED:true}
      employee-id: ${HMS_BOOTSTRAP_ADMIN_EMPLOYEE_ID:EMP-ADMIN}
      full-name: ${HMS_BOOTSTRAP_ADMIN_FULL_NAME:System Administrator}
      username: ${HMS_BOOTSTRAP_ADMIN_USERNAME:admin}
      email: ${HMS_BOOTSTRAP_ADMIN_EMAIL:admin@hmscloud.com}
      phone: ${HMS_BOOTSTRAP_ADMIN_PHONE:9999999999}
      password: ${HMS_BOOTSTRAP_ADMIN_PASSWORD:Hms@1234}
      department: ${HMS_BOOTSTRAP_ADMIN_DEPARTMENT:Administration}
      role: ${HMS_BOOTSTRAP_ADMIN_ROLE:System Administrator}
      shift-name: ${HMS_BOOTSTRAP_ADMIN_SHIFT_NAME:Morning Shift}
      shift-code: ${HMS_BOOTSTRAP_ADMIN_SHIFT_CODE:MORN}

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true

  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${random.value}
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30
